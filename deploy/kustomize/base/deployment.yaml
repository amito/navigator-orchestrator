apiVersion: apps/v1
kind: Deployment
metadata:
  name: navigator-orchestrator
  labels:
    app.kubernetes.io/name: navigator-orchestrator
    app.kubernetes.io/component: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: navigator-orchestrator
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: navigator-orchestrator
        app.kubernetes.io/component: server
    spec:
      serviceAccountName: navigator-orchestrator
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: navigator-orchestrator
          image: navigator-orchestrator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: navigator-orchestrator-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /mcp
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
